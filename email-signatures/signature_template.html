<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<title>Quarry Architects – Email Signature</title>
<!--[if !mso]><!-->
<style>
  :root { color-scheme: light only; supported-color-schemes: light only; }
  @media screen and (max-width: 480px) {
    .sig-wrapper { width: 100% !important; }
    .q-col { width: 25% !important; padding: 10px 10px 10px 0 !important; }
    .q-mark { max-width: 80px !important; }
    .banner-pad { padding: 12px 0 12px 12px !important; }
    .contact-pad { padding: 0 0 8px 10px !important; }
  }
  /* Outlook iOS dark mode — preserve intended colours */
  [data-ogsc] .sig-banner { background-color: #2D2D27 !important; }
  [data-ogsc] .sig-text-dark { color: #2D2D27 !important; }
  [data-ogsc] .sig-text-muted { color: #8C8C8C !important; }
</style>
<!--<![endif]-->
<!--[if mso]>
<style>
table { border-collapse: collapse; }
</style>
<![endif]-->
</head>
<body style="margin:0;padding:0;font-family:Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

<!-- Contact info (above banner) -->
<table cellpadding="0" cellspacing="0" border="0" width="100%" class="sig-wrapper" style="width:100%;max-width:1280px;">
  <tr>
    <td class="contact-pad" style="padding:0 0 12px 12px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td class="sig-text-dark" style="font-family:Helvetica,Arial,sans-serif;font-size:12px;line-height:12px;color:#2D2D27;font-weight:400;letter-spacing:0.04em;padding:0 0 10px 0;">
            Regards
          </td>
        </tr>
        <tr>
          <td class="sig-text-dark" style="font-family:Helvetica,Arial,sans-serif;font-size:13px;line-height:13px;color:#2D2D27;font-weight:700;letter-spacing:0.02em;padding:0 0 3px 0;">
            <a href="mailto:{{email}}" style="color:#2D2D27;text-decoration:none;">{{name}}</a>
          </td>
        </tr>
        <tr>
          <td class="sig-text-muted" style="font-family:Helvetica,Arial,sans-serif;font-size:11px;line-height:11px;color:#8C8C8C;font-weight:400;letter-spacing:0.02em;padding:0 0 6px 0;">
            {{title}}
          </td>
        </tr>
        <tr>
          <td class="sig-text-dark" style="font-family:Helvetica,Arial,sans-serif;font-size:12px;line-height:12px;color:#2D2D27;font-weight:400;letter-spacing:0.02em;padding:{{office_padding}};">
            <a href="tel:{{office_tel}}" style="color:#2D2D27;text-decoration:none;">{{office_display}}</a>
          </td>
        </tr>
{{mobile_block}}      </table>
    </td>
  </tr>
</table>

<!-- Email Signature -->
<table cellpadding="0" cellspacing="0" border="0" width="100%" class="sig-wrapper sig-banner" style="width:100%;max-width:1280px;background-color:#2D2D27;">
  <tr>
    <!-- LHS: footer graphic (replaces tagline + footer text) -->
    <td class="banner-pad" style="padding:16px 0 16px 12px;vertical-align:middle;" valign="middle">
      <a href="https://wearequarry.com" style="text-decoration:none;display:block;">
        <img src="https://assets.wearequarry.com/email-signatures/img/footer-graphic.png" alt="Buildings that blend purpose and place. Quarry Architects | Lytle Associates since 1987" width="290" height="115" class="banner-graphic" style="display:block;width:100%;max-width:290px;height:auto;border:0;" />
      </a>
    </td>

    <!-- RHS: Q mark -->
    <td class="q-col" style="vertical-align:middle;text-align:right;padding:16px 16px 16px 0;width:30%;" width="30%" valign="middle" align="right">
      <a href="https://wearequarry.com" style="text-decoration:none;"><img src="https://assets.wearequarry.com/email-signatures/img/q.png" alt="Quarry Architects" width="96" height="115" class="q-mark" style="display:block;margin-left:auto;width:100%;max-width:96px;height:auto;border:0;" /></a>
    </td>
  </tr>
</table>

</body>
</html>
